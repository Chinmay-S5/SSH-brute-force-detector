<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSH Authentication Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">

    <div class="container mx-auto p-6 space-y-6">
        
        <header class="flex justify-between items-center border-b border-slate-800 pb-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-white">SSH Sentinel</h1>
                <p class="text-slate-400 text-sm">Real-time brute-force detection and access logging</p>
            </div>
            <div class="flex items-center space-x-2 bg-slate-800 px-3 py-1.5 rounded-full text-xs font-semibold">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></span>
                <span class="text-emerald-400">Live Monitoring Active</span>
            </div>
        </header>

        <div id="alert-container" class="hidden space-y-2">
            </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <div class="bg-slate-800 rounded-xl p-5 shadow-lg border border-slate-700/50 h-fit">
                <h2 class="text-lg font-bold text-slate-200 mb-4 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                    Active Logins
                </h2>
                <ul id="active-users-list" class="space-y-2">
                    <li class="text-sm text-slate-500 italic">No active sessions detected.</li>
                </ul>
            </div>

            <div class="lg:col-span-3 bg-slate-800 rounded-xl p-5 shadow-lg border border-slate-700/50">
                <h2 class="text-lg font-bold text-slate-200 mb-4">Access History Log</h2>
                <div class="overflow-x-auto max-h-[600px] overflow-y-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-700 text-slate-400 text-xs uppercase tracking-wider">
                                <th class="pb-3 pt-2 pl-2">Timestamp</th>
                                <th class="pb-3 pt-2">Username</th>
                                <th class="pb-3 pt-2">IP Address</th>
                                <th class="pb-3 pt-2 pr-2">Status</th>
                            </tr>
                        </thead>
                        <tbody id="log-table-body" class="divide-y divide-slate-700/40 text-sm">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        async function fetchMetrics() {
            try {
                const response = await fetch('/api/logs');
                const data = await response.json();
                
                updateAlerts(data.alerts);
                updateActiveUsers(data.active_users);
                updateLogTable(data.logins);
            } catch (error) {
                console.error("Error updates polling metrics dashboard:", error);
            }
        }

        function updateAlerts(alerts) {
            const container = document.getElementById('alert-container');
            if (alerts.length === 0) {
                container.classList.add('hidden');
                container.innerHTML = '';
                return;
            }

            container.classList.remove('hidden');
            container.innerHTML = alerts.map(alert => `
                <div class="bg-red-900/40 border border-red-500 text-red-200 px-4 py-3 rounded-xl flex items-center justify-between shadow-md animate-pulse">
                    <div class="flex items-center space-x-3">
                        <span class="text-xl">⚠️</span>
                        <div>
                            <p class="font-bold text-sm text-red-400">${alert.message}</p>
                            <p class="text-xs text-red-300/80">Source IP: ${alert.ip} | Total Blocked Actions: ${alert.count}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateActiveUsers(users) {
            const list = document.getElementById('active-users-list');
            if (users.length === 0) {
                list.innerHTML = `<li class="text-sm text-slate-500 italic">No active sessions.</li>`;
                return;
            }
            list.innerHTML = users.map(user => `
                <li class="flex items-center space-x-2 bg-slate-900/60 border border-slate-700 px-3 py-2 rounded-lg text-sm font-medium">
                    <span class="w-2 h-2 bg-indigo-400 rounded-full"></span>
                    <span>${user}</span>
                </li>
            `).join('');
        }

        function updateLogTable(logins) {
            const tbody = document.getElementById('log-table-body');
            if (logins.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-slate-500">No login events captured yet.</td></tr>`;
                return;
            }

            tbody.innerHTML = logins.map(log => {
                const statusBadge = log.status === 'Success' 
                    ? '<span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 px-2.5 py-0.5 rounded-full text-xs font-semibold">Success</span>' 
                    : '<span class="bg-red-500/10 text-red-400 border border-red-500/30 px-2.5 py-0.5 rounded-full text-xs font-semibold">Failed</span>';
                
                return `
                    <tr class="hover:bg-slate-700/20 transition-colors">
                        <td class="py-3 pl-2 text-slate-400 font-mono text-xs">${log.time}</td>
                        <td class="py-3 font-semibold text-slate-200">${log.username}</td>
                        <td class="py-3 text-slate-300 font-mono">${log.ip}</td>
                        <td class="py-3 pr-2">${statusBadge}</td>
                    </tr>
                `;
            }).join('');
        }

        // Poll API updates every 2000 milliseconds (2 seconds)
        setInterval(fetchMetrics, 2000);
        // Direct trigger layout initialization on load
        fetchMetrics();
    </script>
</body>
</html>
